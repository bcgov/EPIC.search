version: '3.8'

services:
  epic-search-mcp:
    build: .
    ports:
      - "8000:8000"
    environment:
      - VECTOR_SEARCH_API_URL=${VECTOR_SEARCH_API_URL:-http://host.docker.internal:8080/api}
      - MCP_SERVER_NAME=${MCP_SERVER_NAME:-epic-search-tools}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - API_TIMEOUT=${API_TIMEOUT:-300}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=10)"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 10s

networks:
  default:
    name: epic-search-network
